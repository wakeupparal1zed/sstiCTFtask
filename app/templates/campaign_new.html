{% extends 'base.html' %}
{% block title %}New Campaign | Orbit Mail{% endblock %}
{% block content %}
<section class="panel reveal page-head">
  <div>
    <h1>Create campaign</h1>
    <p>Use dynamic placeholders to personalize campaign content.</p>
  </div>
</section>
<!-- TODO: сменить движок с Mako на другой -->

<section class="panel reveal form-wrap">
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" class="stack-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <label>Campaign title
      <input type="text" name="title" placeholder="Q2 Feature Launch" required>
    </label>

    <label>Email subject
      <input type="text" name="subject" placeholder="Your weekly product digest" required>
    </label>

    <label>Body template
      <textarea name="body_template" rows="13" required>Hello ${user['name']},

Your company ${user['company']} is now on the ${company['plan']} plan.

Regards,
${company['name']} Team</textarea>
    </label>

    <button class="btn" type="submit">Save campaign</button>
  </form>
</section>
{% endblock %}
